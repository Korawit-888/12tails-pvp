<script type="module">
// นำเข้า Supabase SDK
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// ═══════════════════════════════════════════════════
//  👇 ตั้งค่า SUPABASE ตรงนี้
// ═══════════════════════════════════════════════════
const SUPABASE_URL = "https://vkxncgkipevoblwbqmlp.supabase.co"; 
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZreG5jZ2tpcGV2b2Jsd2JxbWxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NjMyNjYsImV4cCI6MjA5MzUzOTI2Nn0._bll-gLpnCsz-GS4fbBm6JoyFki0m8HryZR5iSIlIRQ";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
// ═══════════════════════════════════════════════════

const CHARS=[
  {id:'wolf',label:'หมาป่า',emoji:'🐺'},{id:'sheep',label:'แกะ',emoji:'🐑'},
  {id:'rabbit',label:'กระต่าย',emoji:'🐰'},{id:'bat',label:'ค้างคาว',emoji:'🦇'},
  {id:'penguin',label:'เพนกวิ้น',emoji:'🐧'}
];
const DAYS=[
  {key:'mon',label:'จันทร์',cls:'day-mon',rowCls:'day-row-mon'},
  {key:'tue',label:'อังคาร',cls:'day-tue',rowCls:'day-row-tue'},
  {key:'wed',label:'พุธ',cls:'day-wed',rowCls:'day-row-wed'},
  {key:'thu',label:'พฤหัส',cls:'day-thu',rowCls:'day-row-thu'},
  {key:'fri',label:'ศุกร์',cls:'day-fri',rowCls:'day-row-fri'},
  {key:'sat',label:'เสาร์',cls:'day-sat',rowCls:'day-row-sat'},
  {key:'sun',label:'อาทิตย์',cls:'day-sun',rowCls:'day-row-sun'}
];
const COLS=['00-01','19-20','20-21','21-22','22-23','23-24'];
const COL_LABELS={'00-01':'00:00-01:00','19-20':'19:00-20:00','20-21':'20:00-21:00','21-22':'21:00-22:00','22-23':'22:00-23:00','23-24':'23:00-00:00'};
const SLOTS={tue:{'19-20':'77','21-22':'55','23-24':'77'},wed:{'19-20':'55','23-24':'77'},thu:{'20-21':'77','23-24':'55'},fri:{'00-01':'77'},sat:{'00-01':'77','23-24':'55'},sun:{'19-20':'55'}};
const MAX={'77':7,'55':5};

let currentUser=null, currentUserPhone='', selectedChar=null, currentWeekOffset=0, weekData={};

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
function getWeekKey(off){const d=new Date();const dy=d.getDay();const df=d.getDate()-dy+(dy===0?-6:1);const m=new Date(d.setDate(df+off*7));return m.toISOString().slice(0,10);}
function getWeekLabel(off){const d=new Date();const dy=d.getDay();const df=d.getDate()-dy+(dy===0?-6:1);const m=new Date(d.setDate(df+off*7));const s=new Date(m);s.setDate(m.getDate()+6);const f=dt=>dt.toLocaleDateString('th-TH',{day:'numeric',month:'short'});const pre=off===0?'สัปดาห์นี้ · ':off===-1?'สัปดาห์ที่แล้ว · ':off===1?'สัปดาห์หน้า · ':`W${off>0?'+':''}${off} · `;return pre+f(m)+' – '+f(s);}
function sk(day,col){return day+'_'+col;}
function toast(msg,col){const t=document.getElementById('toast');t.textContent=msg;t.style.borderColor=col||'rgba(255,255,255,0.15)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

// -- INITIALIZE --
(async function init() {
  const saved = localStorage.getItem('raidUser');
  if (saved) {
    currentUser = saved;
    const { data } = await supabase.from('users').select('phone').eq('username', currentUser).single();
    if (data) currentUserPhone = data.phone;
    enterApp();
  } else {
    showPage('auth-page');
  }
})();

window.switchTab=function(tab){
  document.getElementById('login-form').style.display=tab==='login'?'':'none';
  document.getElementById('register-form').style.display=tab==='register'?'':'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
};

window.doLogin = async function() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const m = document.getElementById('login-msg');
  if(!u || !p) { m.textContent='กรุณากรอกข้อมูลให้ครบ'; m.className='msg error'; return; }
  
  const { data, error } = await supabase.from('users').select('*').eq('username', u).eq('password', btoa(p)).single();
  if (error || !data) {
    m.textContent='ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'; m.className='msg error';
  } else {
    currentUser = u;
    currentUserPhone = data.phone;
    localStorage.setItem('raidUser', u);
    enterApp();
  }
};

window.doRegister = async function() {
  const u = document.getElementById('reg-user').value.trim();
  const p = document.getElementById('reg-pass').value;
  const p2 = document.getElementById('reg-pass2').value;
  const phone = document.getElementById('reg-phone').value.trim();
  const m = document.getElementById('reg-msg');
  
  if(!u || !p) { m.textContent='กรุณากรอกข้อมูลให้ครบ'; m.className='msg error'; return; }
  if(p.length < 4) { m.textContent='รหัสผ่านต้องมีอย่างน้อย 4 ตัว'; m.className='msg error'; return; }
  if(p !== p2) { m.textContent='รหัสผ่านไม่ตรงกัน'; m.className='msg error'; return; }

  const { error } = await supabase.from('users').insert([{ username: u, password: btoa(p), phone: phone }]);
  if (error) {
    m.textContent = 'ชื่อผู้ใช้นี้อาจถูกใช้ไปแล้ว หรือเกิดข้อผิดพลาด'; m.className='msg error';
  } else {
    m.textContent = 'สมัครสำเร็จ! กำลังเข้าสู่ระบบ...'; m.className='msg success';
    currentUser = u; currentUserPhone = phone;
    localStorage.setItem('raidUser', u);
    setTimeout(enterApp, 700);
  }
};

window.doLogout = function() {
  localStorage.removeItem('raidUser');
  location.reload();
};

function enterApp(){
  showPage('app-page');
  document.getElementById('nav-username').textContent=currentUser;
  document.getElementById('nav-avatar').textContent=currentUser.charAt(0).toUpperCase();
  renderCharGrid();
  renderWeekLabel();
  fetchWeekData();
  
  // Real-time Subscribe
  supabase.channel('public:signups').on('postgres_changes', { event: '*', schema: 'public', table: 'signups' }, () => {
    fetchWeekData();
  }).subscribe();
}

async function fetchWeekData() {
  const wk = getWeekKey(currentWeekOffset);
  const { data } = await supabase.from('signups').select('*').eq('week_key', wk);
  
  // แปลง Array เป็น Object เพื่อให้โค้ดส่วน Render เดิมทำงานได้
  const formatted = {};
  if (data) {
    data.forEach(row => {
      if (!formatted[row.slot_key]) formatted[row.slot_key] = {};
      formatted[row.slot_key][row.id] = row;
    });
  }
  weekData = formatted;
  renderSchedule();
  if(document.getElementById('view-overview').style.display !== 'none') renderOverview();
}

window.changeWeek=function(d){currentWeekOffset+=d;renderWeekLabel();fetchWeekData();};
window.goCurrentWeek=function(){currentWeekOffset=0;renderWeekLabel();fetchWeekData();};
function renderWeekLabel(){document.getElementById('week-label').textContent=getWeekLabel(currentWeekOffset);}

function renderCharGrid(){
  document.getElementById('char-grid').innerHTML=CHARS.map(c=>`
    <div class="char-card ${selectedChar===c.id?'selected':''}" onclick="selectChar('${c.id}')">
      <span class="char-emoji">${c.emoji}</span><span>${c.label}</span>
    </div>`).join('');
}
window.selectChar=function(id){selectedChar=selectedChar===id?null:id;renderCharGrid();};

function renderSchedule(){
  document.getElementById('sched-body').innerHTML=DAYS.map(day=>{
    const ds=SLOTS[day.key]||{};
    const cells=COLS.map(col=>{
      const type=ds[col]; if(!type) return '<td class="slot-empty"></td>';
      const k=sk(day.key,col);
      const entries=weekData[k] ? Object.values(weekData[k]) : [];
      const max=MAX[type], count=entries.length;
      const joined=entries.some(e=>e.user===currentUser);
      const full=count>=max && !joined;
      let cls=type==='77'?'slot-77':'slot-55';
      if(joined) cls+=' joined'; if(full) cls+=' slot-full';
      return `<td><button class="slot-btn ${cls}" onclick="toggleSlot('${day.key}','${col}','${type}')">
        <span>${type==='77'?'7-7':'5-5'}</span>
        <span class="slot-count">${count}/${max}</span>
      </button></td>`;
    });
    return `<tr class="${day.rowCls}"><td><span class="day-label ${day.cls}">${day.label}</span></td>${cells.join('')}</tr>`;
  }).join('');
}

window.toggleSlot=async function(day, col, type){
  if(!selectedChar){ toast('⚠️ กรุณาเลือกตัวละครก่อน','#f5c842'); return; }
  const wk = getWeekKey(currentWeekOffset);
  const k = sk(day, col);
  
  const entries = weekData[k] ? Object.values(weekData[k]) : [];
  const existing = entries.find(e => e.user === currentUser);

  if (existing) {
    await supabase.from('signups').delete().eq('id', existing.id);
    toast('❌ ยกเลิกการลงชื่อแล้ว');
  } else {
    if (entries.length >= MAX[type]) { toast('⚠️ เต็มแล้ว!','#f55a42'); return; }
    const ch = CHARS.find(c => c.id === selectedChar);
    await supabase.from('signups').insert([{
      week_key: wk,
      slot_key: k,
      user: currentUser,
      char: selectedChar,
      emoji: ch.emoji,
      phone: currentUserPhone
    }]);
    toast(`✅ ลงชื่อด้วย ${ch.emoji} ${ch.label} แล้ว`,'#42f5a4');
  }
  fetchWeekData();
};

function renderOverview(){
  document.getElementById('ov-week-title').textContent='ตารางรวม · '+getWeekLabel(currentWeekOffset);
  const activeCols=COLS.filter(col=>DAYS.some(day=>(SLOTS[day.key]||{})[col]));
  let html=`<table class="ov-table"><thead><tr><th class="day-col">วัน</th>${activeCols.map(col=>`<th>${COL_LABELS[col]}</th>`).join('')}</tr></thead><tbody>`;
  DAYS.forEach(day=>{
    const ds=SLOTS[day.key]||{};
    if(!activeCols.some(col=>ds[col])) return;
    html+=`<tr class="${day.rowCls}"><td class="day-cell"><span class="${day.cls}">${day.label}</span></td>`;
    activeCols.forEach(col=>{
      const type=ds[col];
      if(!type){ html+=`<td class="empty-cell">–</td>`; return; }
      const k=sk(day.key,col);
      const entries=weekData[k]?Object.values(weekData[k]):[];
      const max=MAX[type], count=entries.length, full=count>=max;
      const ph=entries.length===0?'<span class="empty-msg">ยังไม่มีใคร</span>':entries.map(e=>`<div class="player-chip"><span class="player-char">${e.emoji}</span><span>${e.user}</span>${e.phone?`<span class="player-phone">📞${e.phone}</span>`:''}</div>`).join('');
      html+=`<td><div class="ov-cell-inner"><div class="ov-slot-head"><span class="ov-badge ${type==='77'?'badge-77':'badge-55'}">${type==='77'?'7v7':'5v5'}</span><span class="ov-badge ${full?'badge-full':type==='77'?'badge-77':'badge-55'}">${full?'เต็ม':count+'/'+max}</span></div><div class="player-list">${ph}</div><div class="progress-bar"><div class="${type==='77'?'progress-fill-77':'progress-fill-55'}" style="width:${Math.round(count/max*100)}%"></div></div></div></td>`;
    });
    html+=`</tr>`;
  });
  document.getElementById('overview-grid').innerHTML=html+`</tbody></table>`;
}

window.switchView=function(view){
  document.getElementById('view-schedule').style.display=view==='schedule'?'':'none';
  document.getElementById('view-overview').style.display=view==='overview'?'':'none';
  document.getElementById('tab-schedule').classList.toggle('active',view==='schedule');
  document.getElementById('tab-overview').classList.toggle('active',view==='overview');
  if(view==='overview') renderOverview();
};
</script>
