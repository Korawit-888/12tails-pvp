<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12Tails Arena PVP - Rev.04.1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap');
  
  :root {
    --bg: #12141d;
    --bg-darker: #0b0d13;
    --bg-lighter: #1c1f2b;
    --surface: #1e2230;
    --border: rgba(255, 180, 50, 0.15);
    --text: #e2e2e2;
    --text-dim: #9499b0;
    --gold: #f5c842;
    --accent: #e8a020;
    --cyan: #42d4f5;
    --red: #f55a42;
    --green: #42f5a4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; }

  .page { display: none; min-height: 100vh; flex-direction: column; }
  .page.active { display: flex; }

  /* NAV & TABS */
  nav { padding: 1rem 1.5rem; background: var(--bg-darker); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
  .nav-tabs { display: flex; background: var(--bg-darker); border-bottom: 1px solid var(--border); }
  .nav-tab { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-family: 'Kanit'; text-align: center; border-bottom: 2px solid transparent; transition: 0.3s; }
  .nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(245, 200, 66, 0.05); }

  /* AUTH BOX */
  #auth-page { align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle at center, #1c1f2b 0%, #12141d 100%); }
  .auth-box { width: 100%; max-width: 400px; padding: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
  .logo { font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 900; text-align: center; margin-bottom: 1.5rem; background: linear-gradient(135deg, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  
  .tab-bar { display: flex; background: var(--bg-darker); padding: 5px; border-radius: 12px; margin-bottom: 1.5rem; }
  .tab-btn { flex: 1; padding: 0.7rem; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 8px; font-family: 'Kanit'; }
  .tab-btn.active { background: var(--accent); color: #000; font-weight: bold; }

  input { width: 100%; background: var(--bg-darker); border: 1px solid var(--border); color: #fff; padding: 0.9rem; border-radius: 10px; margin-bottom: 1rem; outline: none; }
  .btn-primary { width: 100%; padding: 0.9rem; border: none; border-radius: 10px; background: var(--gold); color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; }

  /* MAIN CONTENT */
  .main { padding: 1.5rem; max-width: 1100px; margin: 0 auto; width: 100%; }
  .section-label { color: var(--gold); font-size: 0.9rem; font-family: 'Kanit'; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }

  /* CHAR GRID */
  .char-grid { display: flex; gap: 10px; margin-bottom: 2rem; flex-wrap: wrap; }
  .char-card { padding: 10px 18px; background: var(--bg-lighter); border: 1px solid var(--border); border-radius: 50px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
  .char-card.selected { border-color: var(--gold); background: rgba(245, 200, 66, 0.2); box-shadow: 0 0 15px rgba(245, 200, 66, 0.1); }

  /* TABLE STYLES */
  .table-wrapper { overflow-x: auto; background: var(--bg-lighter); border-radius: 15px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  th { background: var(--bg-darker); color: var(--text-dim); font-size: 0.75rem; padding: 15px 10px; font-family: 'Kanit'; }
  td { border: 1px solid rgba(255,255,255,0.03); padding: 12px; text-align: center; vertical-align: middle; }

  /* NEW SLOT DESIGN */
  .slot-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .slot-info { font-size: 0.85rem; font-weight: bold; font-family: 'Kanit'; }
  .slot-count { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px; }
  
  .btn-action-group { display: flex; gap: 4px; width: 100%; }
  .btn-sign { flex: 1; padding: 6px 2px; border: none; border-radius: 4px; font-family: 'Kanit'; font-size: 0.7rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
  
  /* ลงชื่อปุ่ม */
  .btn-in { background: rgba(66, 245, 164, 0.1); color: var(--green); border: 1px solid rgba(66, 245, 164, 0.3); }
  .btn-in:hover:not(:disabled) { background: var(--green); color: #000; }
  .btn-in:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ลงชื่อออกปุ่ม */
  .btn-out { background: rgba(245, 90, 66, 0.1); color: var(--red); border: 1px solid rgba(245, 90, 66, 0.3); }
  .btn-out:hover:not(:disabled) { background: var(--red); color: #fff; }
  .btn-out:disabled { opacity: 0.1; cursor: not-allowed; border-color: transparent; }

  .active-in { background: var(--green) !important; color: #000 !important; box-shadow: 0 0 10px rgba(66, 245, 164, 0.3); }

  /* OVERVIEW PLAYER LIST */
  .player-tag { display: flex; flex-direction: column; align-items: flex-start; background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 8px; margin-bottom: 5px; font-size: 0.75rem; border-left: 3px solid var(--gold); }
  .player-name { font-weight: bold; color: #fff; }
  .player-info { color: var(--text-dim); font-size: 0.65rem; }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 12px 24px; border-radius: 50px; font-weight: bold; display: none; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-family: 'Kanit'; }
  .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading-page" class="page active" style="align-items: center; justify-content: center;">
  <div class="spinner"></div>
</div>

<div id="auth-page" class="page">
  <div class="auth-box">
    <div class="logo">12TAILS</div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('login')">เข้าสู่ระบบ</button>
      <button class="tab-btn" onclick="switchTab('register')">สมัครสมาชิก</button>
    </div>
    <div id="login-form">
      <input type="text" id="l-user" placeholder="USERNAME">
      <input type="password" id="l-pass" placeholder="PASSWORD">
      <button class="btn-primary" onclick="doLogin()">⚔️ เข้าสู่ ARENA</button>
    </div>
    <div id="reg-form" style="display:none">
      <input type="text" id="r-user" placeholder="USERNAME">
      <input type="password" id="r-pass" placeholder="PASSWORD">
      <input type="tel" id="r-phone" placeholder="เบอร์โทรศัพท์ (0XXXXXXXXX)">
      <button class="btn-primary" onclick="doRegister()">🦊 สร้างบัญชี</button>
    </div>
    <div id="auth-msg" style="text-align:center; margin-top:1rem; font-size:0.8rem;"></div>
  </div>
</div>

<div id="app-page" class="page">
  <nav>
    <div style="color:var(--gold); font-weight:bold; font-family:Cinzel; letter-spacing:1px;">⚔️ ARENA PVP</div>
    <div style="font-size:0.85rem;">
      <span id="n-user" style="color:#fff; font-weight:bold;"></span> | 
      <a href="#" onclick="doLogout()" style="color:var(--red); text-decoration:none;">ออกจากระบบ</a>
    </div>
  </nav>

  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-join" onclick="switchView('join')">📅 ลงชื่อรับนัด</button>
    <button class="nav-tab" id="tab-list" onclick="switchView('list')">👥 ตารางรวม</button>
  </div>

  <div id="view-join" class="main">
    <div class="section-label">1. เลือกตัวละคร</div>
    <div class="char-grid" id="char-list"></div>
    <div class="section-label">2. ตารางเวลาลงชื่อ</div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>วัน</th><th>19:00 - 20:00</th><th>20:00 - 21:00</th><th>21:00 - 22:00</th><th>22:00 - 23:00</th><th>23:00 - 00:00</th></tr>
        </thead>
        <tbody id="join-body"></tbody>
      </table>
    </div>
  </div>

  <div id="view-list" class="main" style="display:none">
    <div class="section-label">📊 สรุปรายชื่อผู้เล่น</div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>วัน</th><th>19:00</th><th>20:00</th><th>21:00</th><th>22:00</th><th>23:00</th></tr>
        </thead>
        <tbody id="list-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://vkxncgkipevoblwbqmlp.supabase.co"; 
const SUPABASE_KEY = "sb_publishable_kZLsrPjyix00ONTZYb7ryA_NmCl8Tq_"; 
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const CHARS = [
  {id:'wolf',emoji:'🐺',n:'หมา'}, {id:'sheep',emoji:'🐑',n:'แกะ'},
  {id:'rabbit',emoji:'🐰',n:'ต่าย'}, {id:'bat',emoji:'🦇',n:'ค้างคาว'},
  {id:'penguin',emoji:'🐧',n:'กวิ้น'}
];
const DAYS = [
  {k:'mon',l:'จันทร์'},{k:'tue',l:'อังคาร'},{k:'wed',l:'พุธ'},
  {k:'thu',l:'พฤหัส'},{k:'fri',l:'ศุกร์'},{k:'sat',l:'เสาร์'},{k:'sun',l:'อาทิตย์'}
];
const TIMES = ['19-20','20-21','21-22','22-23','23-24'];
const SLOTS = {
  tue:{'19-20':'77','21-22':'55'},
  wed:{'21-22':'77'},
  thu:{'20-21':'77'},
  fri:{'22-23':'55'},
  sat:{'19-20':'77','23-24':'55'}
};

let user = localStorage.getItem('raidUser');
let userPhone = localStorage.getItem('raidPhone') || '';
let selectedChar = null;
let signups = [];

window.onload = async () => {
  if(user) {
    document.getElementById('n-user').textContent = user;
    await sync();
    show('app-page');
  } else { show('auth-page'); }
  renderChars();
};

window.switchTab = (t) => {
  document.getElementById('login-form').style.display = t==='login'?'block':'none';
  document.getElementById('reg-form').style.display = t==='register'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(t==='login'?'เข้า':'สมัคร')));
};

window.switchView = (v) => {
  document.getElementById('view-join').style.display = v==='join'?'block':'none';
  document.getElementById('view-list').style.display = v==='list'?'block':'none';
  document.getElementById('tab-join').classList.toggle('active', v==='join');
  document.getElementById('tab-list').classList.toggle('active', v==='list');
  if(v === 'list') renderOverview();
};

window.doLogin = async () => {
  const u = document.getElementById('l-user').value.trim();
  const p = btoa(document.getElementById('l-pass').value);
  const { data } = await supabase.from('users').select('*').eq('username',u).eq('password',p).single();
  if(data) {
    localStorage.setItem('raidUser', u);
    localStorage.setItem('raidPhone', data.phone || '');
    location.reload();
  } else { msg("Username/Password ผิด", "#f55a42"); }
};

window.doRegister = async () => {
  const u = document.getElementById('r-user').value.trim();
  const p = btoa(document.getElementById('r-pass').value);
  const ph = document.getElementById('r-phone').value.trim();
  if(!u || !ph) { msg("กรุณากรอกข้อมูลให้ครบ", "#f55a42"); return; }
  const { error } = await supabase.from('users').insert([{username:u, password:p, phone:ph}]);
  if(!error) { alert("สมัครสำเร็จ!"); location.reload(); }
  else { msg("ชื่อผู้ใช้นี้มีคนใช้แล้ว", "#f55a42"); }
};

window.doLogout = () => { localStorage.clear(); location.reload(); };

async function sync() {
  const { data } = await supabase.from('signups').select('*');
  signups = data || [];
  renderSchedule();
}

function renderChars() {
  document.getElementById('char-list').innerHTML = CHARS.map(c => `
    <div class="char-card ${selectedChar===c.id?'selected':''}" onclick="setChar('${c.id}')">
      ${c.emoji} ${c.n}
    </div>`).join('');
}
window.setChar = (id) => { selectedChar = id; renderChars(); };

function renderSchedule() {
  let h = '';
  DAYS.forEach(day => {
    h += `<tr><td style="font-weight:bold; color:var(--text-dim);">${day.l}</td>`;
    TIMES.forEach(t => {
      const type = (SLOTS[day.k] && SLOTS[day.k][t]) || null;
      if(!type) { h += '<td>-</td>'; return; }
      const key = `${day.k}_${t}`;
      const players = signups.filter(s => s.slot_key === key);
      const isMe = players.some(s => s.user === user);
      const max = type==='77'?7:5;
      const isFull = players.length >= max;

      h += `<td>
        <div class="slot-container">
          <div class="slot-info" style="color:${type==='77'?'var(--gold)':'var(--cyan)'}">${type==='77'?'7v7':'5v5'}</div>
          <div class="slot-count">${players.length}/${max}</div>
          <div class="btn-action-group">
            <button class="btn-sign btn-in ${isMe?'active-in':''}" 
              onclick="handleJoin('${key}')" ${ (isFull && !isMe) || isMe ? 'disabled' : '' }>ลงชื่อ</button>
            <button class="btn-sign btn-out" 
              onclick="handleLeave('${key}')" ${ !isMe ? 'disabled' : '' }>ออก</button>
          </div>
        </div>
      </td>`;
    });
    h += '</tr>';
  });
  document.getElementById('join-body').innerHTML = h;
}

function renderOverview() {
  let h = '';
  DAYS.forEach(day => {
    h += `<tr><td style="font-weight:bold; color:var(--gold); font-size:0.8rem;">${day.l}</td>`;
    TIMES.forEach(t => {
      const type = (SLOTS[day.k] && SLOTS[day.k][t]) || null;
      if(!type) { h += '<td>-</td>'; return; }
      const key = `${day.k}_${t}`;
      const players = signups.filter(s => s.slot_key === key);
      const max = type==='77'?7:5;
      
      let playerHtml = players.map(p => `
        <div class="player-tag">
          <span class="player-name">${p.emoji} ${p.user}</span>
          <span class="player-info">📞 ${p.phone || '-'}</span>
        </div>
      `).join('');

      h += `<td>
        <div style="font-size:0.7rem; margin-bottom:6px; font-weight:bold; color:var(--cyan)">${type==='77'?'7v7':'5v5'} (${players.length}/${max})</div>
        ${playerHtml}
      </td>`;
    });
    h += '</tr>';
  });
  document.getElementById('list-body').innerHTML = h;
}

window.handleJoin = async (key) => {
  if(!selectedChar) { showToast("กรุณาเลือกตัวละครก่อน!"); return; }
  const c = CHARS.find(x => x.id === selectedChar);
  await supabase.from('signups').insert([{
    slot_key: key, user: user, char: c.id, emoji: c.emoji, phone: userPhone 
  }]);
  showToast("ลงชื่อสำเร็จ!");
  await sync();
};

window.handleLeave = async (key) => {
  const has = signups.find(s => s.slot_key === key && s.user === user);
  if(has) {
    await supabase.from('signups').delete().eq('id', has.id);
    showToast("เอาชื่อออกแล้ว");
    await sync();
  }
};

function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function msg(t, c) {
  const e = document.getElementById('auth-msg');
  e.textContent = t; e.style.color = c;
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

supabase.channel('arena').on('postgres_changes', {event:'*', schema:'public', table:'signups'}, sync).subscribe();
</script>
</body>
</html>
