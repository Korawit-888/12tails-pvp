<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12Tails Arena PVP - Supabase Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap');
  :root{
    --bg:#04060e;--bg2:#080d1a;--bg3:#0d1526;--surface:#111827;--surface2:#162035;
    --border:rgba(255,180,50,0.1);--border2:rgba(255,180,50,0.25);
    --text:#f0e8d0;--text2:#9898b0;--text3:#5a5a72;
    --accent:#e8a020;--accent2:#c07010;--gold:#f5c842;--cyan:#42d4f5;--green:#42f5a4;--red:#f55a42;
    --glow:rgba(232,160,32,0.35);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  .page{display:none;min-height:100vh;}.page.active{display:flex;flex-direction:column;}
  #loading-page{align-items:center;justify-content:center;}
  .spinner{width:44px;height:44px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:1.2rem;}
  @keyframes spin{to{transform:rotate(360deg);}}
  
  /* AUTH PAGE */
  #auth-page{
    align-items:center;justify-content:center;
    background: radial-gradient(ellipse at 50% 0%,rgba(232,160,32,0.18) 0%,transparent 55%), url('https://i.ibb.co/mXhBDSp/12tails-bg.jpg') center/cover no-repeat, var(--bg);
    position:relative;
  }
  .auth-box{
    width:100%;max-width:440px;padding:2.5rem;position:relative;z-index:1;
    background:rgba(8,13,26,0.85); border:1px solid rgba(255,180,50,0.2); border-radius:16px;
    backdrop-filter:blur(18px); box-shadow:0 0 60px rgba(232,160,32,0.12), 0 24px 64px rgba(0,0,0,0.6);
  }
  .logo{ font-family:'Cinzel',serif;font-size:2.2rem;font-weight:900;text-align:center; background:linear-gradient(135deg,#f5c842,#e8a020,#fff8e0); -webkit-background-clip:text;-webkit-text-fill-color:transparent; margin-bottom:1.5rem;}
  
  .tab-bar{display:flex;background:var(--surface);border-radius:10px;padding:4px;margin-bottom:1.5rem;}
  .tab-btn{flex:1;padding:0.6rem;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:7px;font-family:'Kanit';}
  .tab-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}

  input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:#fff;padding:0.8rem;border-radius:8px;margin-bottom:1rem;outline:none;}
  .btn-primary{width:100%;padding:0.8rem;border:none;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;cursor:pointer;}
  
  /* APP CONTENT */
  nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;background:var(--bg2);border-bottom:1px solid var(--border);}
  .main{padding:1.5rem;max-width:1200px;margin:0 auto;width:100%;}
  .char-grid{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
  .char-card{padding:0.5rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:20px;cursor:pointer;}
  .char-card.selected{border-color:var(--gold);background:rgba(245,200,66,0.1);}

  .sched-table{width:100%;border-collapse:collapse;margin-top:1rem;}
  .sched-table th, .sched-table td{border:1px solid var(--border);padding:10px;text-align:center;}
  .slot-btn{width:100%;padding:8px;border:none;border-radius:6px;cursor:pointer;font-weight:600;}
  .slot-77{background:rgba(245,200,66,0.1);color:var(--gold);}
  .slot-55{background:rgba(66,212,245,0.1);color:var(--cyan);}
  .joined{outline:2px solid var(--gold);background:rgba(255,255,255,0.1);}
  
  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--surface2);padding:10px 20px;border-radius:20px;display:none;z-index:99;}
</style>
</head>
<body>

<div id="loading-page" class="page active">
  <div class="spinner"></div>
  <div style="font-family:Cinzel;color:var(--accent)">CONNECTING TO ARENA...</div>
</div>

<div id="auth-page" class="page">
  <div class="auth-box">
    <div class="logo">12TAILS</div>
    <div class="tab-bar">
      <button class="tab-btn active" id="t-login" onclick="switchTab('login')">LOGIN</button>
      <button class="tab-btn" id="t-reg" onclick="switchTab('register')">REGISTER</button>
    </div>
    <div id="login-form">
      <input type="text" id="l-user" placeholder="USERNAME">
      <input type="password" id="l-pass" placeholder="PASSWORD">
      <button class="btn-primary" onclick="doLogin()">ENTER ARENA</button>
    </div>
    <div id="reg-form" style="display:none">
      <input type="text" id="r-user" placeholder="USERNAME">
      <input type="password" id="r-pass" placeholder="PASSWORD">
      <input type="tel" id="r-phone" placeholder="PHONE (08XXXXXXXX)">
      <button class="btn-primary" onclick="doRegister()">CREATE ACCOUNT</button>
    </div>
    <div id="auth-msg" style="text-align:center;margin-top:1rem;font-size:0.8rem;"></div>
  </div>
</div>

<div id="app-page" class="page">
  <nav>
    <div style="color:var(--gold);font-weight:bold;">⚔️ 12TAILS ARENA</div>
    <div style="font-size:0.8rem;"><span id="n-user"></span> | <a href="#" onclick="doLogout()" style="color:var(--red);text-decoration:none;">Logout</a></div>
  </nav>
  <div class="main">
    <div style="margin-bottom:1rem;color:var(--gold);font-size:0.9rem;">1. CHOOSE CHARACTER</div>
    <div class="char-grid" id="char-list"></div>
    
    <div style="margin-bottom:1rem;color:var(--gold);font-size:0.9rem;">2. JOIN BATTLE TIME</div>
    <div style="overflow-x:auto;">
      <table class="sched-table">
        <thead>
          <tr><th>DAY</th><th>19:00</th><th>20:00</th><th>21:00</th><th>22:00</th><th>23:00</th></tr>
        </thead>
        <tbody id="sched-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// ✅ ข้อมูลของคุณที่แก้ไขใหม่
const SUPABASE_URL = "https://vkxncgkipevoblwbqmlp.supabase.co"; 
const SUPABASE_KEY = "sb_publishable_kZLsrPjyix00ONTZYb7ryA_NmCl8Tq_"; 
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const CHARS = [
  {id:'wolf',emoji:'🐺',n:'หมา'},{id:'sheep',emoji:'🐑',n:'แกะ'},
  {id:'rabbit',emoji:'🐰',n:'ต่าย'},{id:'bat',emoji:'🦇',n:'ค้างคาว'},
  {id:'penguin',emoji:'🐧',n:'กวิ้น'}
];
const DAYS = ['mon','tue','wed','thu','fri','sat','sun'];
const TIMES = ['19-20','20-21','21-22','22-23','23-24'];
const SLOTS = {
  tue:{'19-20':'77','21-22':'55'},
  wed:{'21-22':'77'},
  thu:{'20-21':'77'},
  fri:{'22-23':'55'},
  sat:{'19-20':'77','23-24':'55'}
};

let user = localStorage.getItem('raidUser');
let selectedChar = null;
let signups = [];

window.onload = async () => {
  if(user) {
    document.getElementById('n-user').textContent = user;
    await sync();
    show('app-page');
  } else {
    show('auth-page');
  }
  renderChars();
};

window.switchTab = (t) => {
  document.getElementById('login-form').style.display = t==='login'?'block':'none';
  document.getElementById('reg-form').style.display = t==='register'?'block':'none';
  document.getElementById('t-login').classList.toggle('active', t==='login');
  document.getElementById('t-reg').classList.toggle('active', t==='register');
};

window.doLogin = async () => {
  const u = document.getElementById('l-user').value;
  const p = btoa(document.getElementById('l-pass').value);
  const { data } = await supabase.from('users').select('*').eq('username',u).eq('password',p).single();
  if(data) {
    localStorage.setItem('raidUser', u);
    location.reload();
  } else {
    msg("Login Failed!", "red");
  }
};

window.doRegister = async () => {
  const u = document.getElementById('r-user').value;
  const p = btoa(document.getElementById('r-pass').value);
  const ph = document.getElementById('r-phone').value;
  const { error } = await supabase.from('users').insert([{username:u, password:p, phone:ph}]);
  if(!error) {
    alert("Register Success!");
    location.reload();
  } else {
    msg("Username already taken!", "red");
  }
};

window.doLogout = () => { localStorage.removeItem('raidUser'); location.reload(); };

async function sync() {
  const { data } = await supabase.from('signups').select('*');
  signups = data || [];
  renderSchedule();
}

function renderChars() {
  document.getElementById('char-list').innerHTML = CHARS.map(c => `
    <div class="char-card ${selectedChar===c.id?'selected':''}" onclick="setChar('${c.id}')">
      ${c.emoji} ${c.n}
    </div>`).join('');
}

window.setChar = (id) => { selectedChar = id; renderChars(); };

function renderSchedule() {
  let h = '';
  DAYS.forEach(d => {
    h += `<tr><td style="font-size:0.7rem;font-weight:bold;">${d.toUpperCase()}</td>`;
    TIMES.forEach(t => {
      const type = (SLOTS[d] && SLOTS[d][t]) || null;
      if(!type) { h += '<td>-</td>'; return; }
      const key = `${d}_${t}`;
      const count = signups.filter(s => s.slot_key === key).length;
      const joined = signups.some(s => s.slot_key === key && s.user === user);
      h += `<td>
        <button class="slot-btn slot-${type} ${joined?'joined':''}" onclick="toggle('${key}')">
          ${type==='77'?'7v7':'5v5'} (${count}/${type==='77'?7:5})
        </button>
      </td>`;
    });
    h += '</tr>';
  });
  document.getElementById('sched-body').innerHTML = h;
}

window.toggle = async (key) => {
  if(!selectedChar) { alert("Please choose a character!"); return; }
  const has = signups.find(s => s.slot_key === key && s.user === user);
  if(has) {
    await supabase.from('signups').delete().eq('id', has.id);
  } else {
    const c = CHARS.find(x => x.id === selectedChar);
    await supabase.from('signups').insert([{slot_key:key, user:user, char:c.id, emoji:c.emoji}]);
  }
  await sync();
};

function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function msg(t, c) {
  const e = document.getElementById('auth-msg');
  e.textContent = t; e.style.color = c;
}

// Real-time
supabase.channel('any').on('postgres_changes', {event:'*', schema:'public', table:'signups'}, sync).subscribe();
</script>
</body>
</html>
