<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12Tails Arena PVP - Rev.03.2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap');
  
  :root {
    /* ปรับโทนสีดำ-เทา ให้ไม่มืดสนิท (Deep Charcoal Theme) */
    --bg: #12141d;
    --bg-darker: #0b0d13;
    --bg-lighter: #1c1f2b;
    --surface: #1e2230;
    --border: rgba(255, 180, 50, 0.15);
    --text: #e2e2e2;
    --text-dim: #9499b0;
    --gold: #f5c842;
    --accent: #e8a020;
    --cyan: #42d4f5;
    --red: #f55a42;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Sarabun', sans-serif;
    background-color: var(--bg);
    background-image: 
      radial-gradient(at 0% 0%, rgba(232, 160, 32, 0.05) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(66, 212, 245, 0.05) 0px, transparent 50%);
    color: var(--text);
    min-height: 100vh;
  }

  .page { display: none; min-height: 100vh; }
  .page.active { display: flex; flex-direction: column; }

  /* LOADING */
  #loading-page { align-items: center; justify-content: center; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.05);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* AUTH BOX */
  #auth-page { align-items: center; justify-content: center; padding: 20px; }
  .auth-box {
    width: 100%; max-width: 400px; padding: 2rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }
  .logo {
    font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 900;
    text-align: center; margin-bottom: 1.5rem;
    background: linear-gradient(135deg, #fff, var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .tab-bar { display: flex; background: var(--bg-darker); padding: 5px; border-radius: 12px; margin-bottom: 1.5rem; }
  .tab-btn {
    flex: 1; padding: 0.7rem; border: none; background: transparent;
    color: var(--text-dim); cursor: pointer; border-radius: 8px; font-family: 'Kanit';
  }
  .tab-btn.active { background: var(--accent); color: #000; font-weight: bold; }

  input {
    width: 100%; background: var(--bg-darker); border: 1px solid var(--border);
    color: #fff; padding: 0.9rem; border-radius: 10px; margin-bottom: 1rem; outline: none;
  }
  .btn-primary {
    width: 100%; padding: 0.9rem; border: none; border-radius: 10px;
    background: var(--gold); color: #000; font-weight: bold; cursor: pointer;
    transition: 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }

  /* MAIN CONTENT */
  nav { padding: 1.2rem 1.5rem; background: var(--bg-darker); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .main { padding: 1.5rem; max-width: 900px; margin: 0 auto; width: 100%; }
  
  .section-label { color: var(--gold); font-size: 0.85rem; font-family: 'Kanit'; margin-bottom: 1rem; letter-spacing: 1px; }

  .char-grid { display: flex; gap: 10px; margin-bottom: 2rem; flex-wrap: wrap; }
  .char-card {
    padding: 10px 18px; background: var(--bg-lighter); border: 1px solid var(--border);
    border-radius: 50px; cursor: pointer; transition: 0.2s; font-size: 0.9rem;
  }
  .char-card.selected { border-color: var(--gold); background: rgba(245, 200, 66, 0.2); box-shadow: 0 0 15px rgba(245, 200, 66, 0.1); }

  .sched-table { width: 100%; border-collapse: collapse; background: var(--bg-lighter); border-radius: 15px; overflow: hidden; }
  .sched-table th { background: var(--bg-darker); color: var(--text-dim); font-size: 0.75rem; padding: 12px; }
  .sched-table td { border: 1px solid rgba(255,255,255,0.03); padding: 8px; text-align: center; }

  .slot-btn {
    width: 100%; padding: 10px 5px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Kanit'; font-weight: 600; font-size: 0.8rem;
  }
  .slot-77 { background: rgba(245, 200, 66, 0.1); color: var(--gold); }
  .slot-55 { background: rgba(66, 212, 245, 0.1); color: var(--cyan); }
  .slot-btn.joined { background: var(--gold); color: #000; box-shadow: 0 0 15px rgba(245, 200, 66, 0.3); }
  
  .day-name { font-size: 0.7rem; font-weight: bold; color: var(--text-dim); }

  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: var(--gold); color: #000; padding: 12px 24px; border-radius: 50px;
    font-weight: bold; display: none; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<div id="loading-page" class="page active">
  <div class="spinner"></div>
</div>

<div id="auth-page" class="page">
  <div class="auth-box">
    <div class="logo">12TAILS</div>
    <div class="tab-bar">
      <button class="tab-btn active" id="t-login" onclick="switchTab('login')">LOGIN</button>
      <button class="tab-btn" id="t-reg" onclick="switchTab('register')">REGISTER</button>
    </div>
    <div id="login-form">
      <input type="text" id="l-user" placeholder="USERNAME">
      <input type="password" id="l-pass" placeholder="PASSWORD">
      <button class="btn-primary" onclick="doLogin()">ENTER ARENA</button>
    </div>
    <div id="reg-form" style="display:none">
      <input type="text" id="r-user" placeholder="USERNAME">
      <input type="password" id="r-pass" placeholder="PASSWORD">
      <input type="tel" id="r-phone" placeholder="PHONE (08XXXXXXXX)">
      <button class="btn-primary" onclick="doRegister()">CREATE ACCOUNT</button>
    </div>
    <div id="auth-msg" style="text-align:center; margin-top:1rem; font-size:0.8rem;"></div>
  </div>
</div>

<div id="app-page" class="page">
  <nav>
    <div style="color:var(--gold); font-weight:bold; font-family:Cinzel;">⚔️ ARENA</div>
    <div style="font-size:0.85rem; color:var(--text-dim);">
      <span id="n-user" style="color:var(--text);"></span> | 
      <a href="#" onclick="doLogout()" style="color:var(--red); text-decoration:none;">Logout</a>
    </div>
  </nav>
  <div class="main">
    <div class="section-label">1. CHOOSE YOUR CHARACTER</div>
    <div class="char-grid" id="char-list"></div>
    
    <div class="section-label">2. BATTLE SCHEDULE</div>
    <div style="overflow-x:auto;">
      <table class="sched-table">
        <thead>
          <tr><th>DAY</th><th>19:00</th><th>20:00</th><th>21:00</th><th>22:00</th><th>23:00</th></tr>
        </thead>
        <tbody id="sched-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://vkxncgkipevoblwbqmlp.supabase.co"; 
const SUPABASE_KEY = "sb_publishable_kZLsrPjyix00ONTZYb7ryA_NmCl8Tq_"; 
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const CHARS = [
  {id:'wolf',emoji:'🐺',n:'หมา'}, {id:'sheep',emoji:'🐑',n:'แกะ'},
  {id:'rabbit',emoji:'🐰',n:'ต่าย'}, {id:'bat',emoji:'🦇',n:'ค้างคาว'},
  {id:'penguin',emoji:'🐧',n:'กวิ้น'}
];
const DAYS = ['mon','tue','wed','thu','fri','sat','sun'];
const TIMES = ['19-20','20-21','21-22','22-23','23-24'];
const SLOTS = {
  tue:{'19-20':'77','21-22':'55'},
  wed:{'21-22':'77'},
  thu:{'20-21':'77'},
  fri:{'22-23':'55'},
  sat:{'19-20':'77','23-24':'55'}
};

let user = localStorage.getItem('raidUser');
let selectedChar = null;
let signups = [];

window.onload = async () => {
  if(user) {
    document.getElementById('n-user').textContent = user;
    await sync();
    show('app-page');
  } else {
    show('auth-page');
  }
  renderChars();
};

window.switchTab = (t) => {
  document.getElementById('login-form').style.display = t==='login'?'block':'none';
  document.getElementById('reg-form').style.display = t==='register'?'block':'none';
  document.getElementById('t-login').classList.toggle('active', t==='login');
  document.getElementById('t-reg').classList.toggle('active', t==='register');
};

window.doLogin = async () => {
  const u = document.getElementById('l-user').value.trim();
  const p = btoa(document.getElementById('l-pass').value);
  const { data, error } = await supabase.from('users').select('*').eq('username',u).eq('password',p).single();
  if(data) {
    localStorage.setItem('raidUser', u);
    location.reload();
  } else {
    msg("Login Failed!", "#f55a42");
  }
};

window.doRegister = async () => {
  const u = document.getElementById('r-user').value.trim();
  const p = btoa(document.getElementById('r-pass').value);
  const ph = document.getElementById('r-phone').value.trim();
  if(!u || !ph) { msg("Please fill all fields", "#f55a42"); return; }
  const { error } = await supabase.from('users').insert([{username:u, password:p, phone:ph}]);
  if(!error) {
    alert("Welcome to the Arena!");
    localStorage.setItem('raidUser', u);
    location.reload();
  } else {
    msg("Username taken or Error!", "#f55a42");
  }
};

window.doLogout = () => { localStorage.removeItem('raidUser'); location.reload(); };

async function sync() {
  const { data } = await supabase.from('signups').select('*');
  signups = data || [];
  renderSchedule();
}

function renderChars() {
  document.getElementById('char-list').innerHTML = CHARS.map(c => `
    <div class="char-card ${selectedChar===c.id?'selected':''}" onclick="setChar('${c.id}')">
      ${c.emoji} ${c.n}
    </div>`).join('');
}

window.setChar = (id) => { selectedChar = id; renderChars(); };

function renderSchedule() {
  let h = '';
  DAYS.forEach(d => {
    h += `<tr><td><span class="day-name">${d.toUpperCase()}</span></td>`;
    TIMES.forEach(t => {
      const type = (SLOTS[d] && SLOTS[d][t]) || null;
      if(!type) { h += '<td>-</td>'; return; }
      const key = `${d}_${t}`;
      const count = signups.filter(s => s.slot_key === key).length;
      const joined = signups.some(s => s.slot_key === key && s.user === user);
      h += `<td>
        <button class="slot-btn slot-${type} ${joined?'joined':''}" onclick="toggle('${key}')">
          ${type==='77'?'7v7':'5v5'} (${count})
        </button>
      </td>`;
    });
    h += '</tr>';
  });
  document.getElementById('sched-body').innerHTML = h;
}

window.toggle = async (key) => {
  if(!selectedChar) { showToast("SELECT CHAR FIRST!"); return; }
  const has = signups.find(s => s.slot_key === key && s.user === user);
  if(has) {
    await supabase.from('signups').delete().eq('id', has.id);
    showToast("REMOVED!");
  } else {
    const c = CHARS.find(x => x.id === selectedChar);
    await supabase.from('signups').insert([{slot_key:key, user:user, char:c.id, emoji:c.emoji}]);
    showToast("JOINED!");
  }
  await sync();
};

function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function msg(t, c) {
  const e = document.getElementById('auth-msg');
  e.textContent = t; e.style.color = c;
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

supabase.channel('any').on('postgres_changes', {event:'*', schema:'public', table:'signups'}, sync).subscribe();
</script>
</body>
</html>
